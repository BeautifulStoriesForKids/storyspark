<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StorySpark – AI Children's Book Creator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: linear-gradient(135deg,#FFF8E7,#FDEBD0); font-family: Georgia, serif; padding: 24px 16px; }
  h1 { font-size: 2.2rem; color: #3D1C02; text-align: center; }
  h1 span { color: #E07B39; }
  .subtitle { color: #7A4E2D; font-style: italic; text-align: center; margin: 6px 0 28px; font-size: 0.95rem; }
  .card { background: white; border-radius: 20px; padding: 24px; max-width: 680px; margin: 0 auto 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  label { display: block; font-size: 0.72rem; font-weight: bold; color: #7A4E2D; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; font-family: Arial; }
  input, select { width: 100%; padding: 10px 14px; border-radius: 10px; border: 2px solid #F0DEC8; font-size: 1rem; color: #3D1C02; background: #FFFAF4; outline: none; font-family: Georgia, serif; margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid input, .grid select { margin-bottom: 16px; }
  button.primary { width: 100%; padding: 14px; background: linear-gradient(135deg,#E07B39,#C85D1E); color: white; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: bold; cursor: pointer; font-family: Georgia, serif; box-shadow: 0 4px 14px rgba(224,123,57,0.4); }
  button.primary:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
  .error { background: #FFF0ED; border: 2px solid #FFB8A8; border-radius: 10px; padding: 12px 16px; color: #C0392B; font-size: 0.85rem; margin-bottom: 14px; font-family: Arial; display: none; word-break: break-word; }
  .info { background: #EFF8FF; border: 2px solid #BEE3F8; border-radius: 10px; padding: 12px 16px; color: #2B6CB0; font-size: 0.85rem; margin-bottom: 16px; font-family: Arial; }
  .info a { color: #2B6CB0; }
  .cover { background: linear-gradient(135deg,#E07B39,#C85D1E); border-radius: 20px; padding: 40px 28px; margin-bottom: 14px; text-align: center; color: white; box-shadow: 0 8px 28px rgba(224,123,57,0.35); max-width: 680px; margin: 0 auto 14px; }
  .cover-title { font-size: 1.8rem; font-weight: bold; line-height: 1.2; margin-bottom: 8px; }
  .cover-tagline { font-style: italic; opacity: 0.85; }
  .cover-meta { margin-top: 12px; font-size: 0.78rem; opacity: 0.7; font-family: Arial; }
  .page-card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 12px; box-shadow: 0 3px 16px rgba(0,0,0,0.07); position: relative; max-width: 680px; margin: 0 auto 12px; }
  .page-num { position: absolute; top: 14px; right: 18px; font-size: 0.72rem; color: #C0A080; font-family: Arial; text-transform: uppercase; letter-spacing: 1px; }
  .page-art { width: 100%; height: 160px; border-radius: 12px; background: linear-gradient(135deg,#FFF3E0,#FFE0B2); display: flex; align-items: center; justify-content: center; font-size: 5rem; margin-bottom: 16px; }
  .page-text { font-size: 1.15rem; line-height: 1.8; color: #3D1C02; text-align: center; font-style: italic; margin-bottom: 10px; }
  .page-note { font-size: 0.82rem; color: #A0784A; text-align: center; font-family: Arial; }
  .actions { display: flex; gap: 10px; max-width: 680px; margin: 4px auto 32px; }
  .btn-outline { flex: 1; padding: 12px; border-radius: 10px; border: 2px solid #E07B39; background: white; color: #E07B39; font-size: 0.9rem; font-weight: bold; cursor: pointer; font-family: Arial; }
  #book { display: none; }
  #loading { display: none; text-align: center; padding: 32px; color: #7A4E2D; font-size: 1.1rem; max-width: 680px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
</style>
</head>
<body>

<h1>✨ Story<span>Spark</span></h1>
<p class="subtitle">AI children's book creator</p>

<!-- API Key Card -->
<div class="card">
  <div class="info">
    🔑 You need a free Anthropic API key. Get one at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> → API Keys → Create Key
  </div>
  <label>Your Anthropic API Key</label>
  <input id="apiKey" type="password" placeholder="sk-ant-..." />
</div>

<!-- Story Form -->
<div class="card">
  <label>Main Character Name</label>
  <input id="hero" type="text" placeholder="e.g. Luna the little fox, Captain Benny..." />

  <div class="grid">
    <div>
      <label>Theme</label>
      <select id="theme">
        <option>Friendship & Kindness</option>
        <option>Bravery & Courage</option>
        <option>Curiosity & Learning</option>
        <option>Sharing & Caring</option>
        <option>Nature & Animals</option>
        <option>Imagination & Dreams</option>
        <option>Family & Love</option>
        <option>Overcoming Fears</option>
      </select>
    </div>
    <div>
      <label>Age Group</label>
      <select id="age">
        <option>2–4 years (Toddler)</option>
        <option selected>4–6 years (Pre-K)</option>
        <option>6–8 years (Early Reader)</option>
        <option>8–10 years (Middle Grade)</option>
      </select>
    </div>
  </div>

  <div class="grid">
    <div>
      <label>Number of Pages</label>
      <select id="pages">
        <option value="6">6 pages</option>
        <option value="8" selected>8 pages</option>
        <option value="10">10 pages</option>
        <option value="12">12 pages</option>
      </select>
    </div>
    <div>
      <label>Special Notes (optional)</label>
      <input id="extra" type="text" placeholder="e.g. set in space, has a dog..." />
    </div>
  </div>

  <pre id="debug" style="display:none;background:#1a1a2e;color:#00ff88;padding:14px;border-radius:10px;font-size:0.75rem;overflow-x:auto;white-space:pre-wrap;margin-bottom:14px;max-height:200px;overflow-y:auto"></pre>
  <div class="error" id="error"></div>
  <button class="primary" id="genBtn" onclick="generate()">✨ Generate My Book</button>
</div>

<div id="loading">📖 Writing your story, one page at a time...</div>

<div id="book">
  <div class="cover" id="cover"></div>
  <div id="pages"></div>
  <div class="actions">
    <button class="btn-outline" onclick="copyStory()">📋 Copy Story</button>
    <button class="btn-outline" onclick="generate()">🔄 New Version</button>
  </div>
</div>

<script>
let currentBook = null;

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}
function hideError() {
  document.getElementById('error').style.display = 'none';
}

async function generate() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const hero   = document.getElementById('hero').value.trim();

  if (!apiKey) { showError('Please enter your Anthropic API key above.'); return; }
  if (!hero)   { showError('Please enter a character name!'); return; }
  hideError();

  const theme = document.getElementById('theme').value;
  const age   = document.getElementById('age').value;
  const pages = document.getElementById('pages').value;
  const extra = document.getElementById('extra').value;

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.textContent = '✍️ Writing your story...';
  document.getElementById('book').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  const prompt = `You are a children's book author. Create a complete children's book with exactly ${pages} pages.
Main character: ${hero}
Theme: ${theme}
Age group: ${age}
Extra notes: ${extra || "none"}

Return ONLY valid JSON, no markdown, no backticks, no extra text. Use this structure:
{"title":"Book title","tagline":"Short tagline","pages":[{"text":"1-3 sentences","emoji":"🌟","illustrationNote":"What to draw"}]}

Exactly ${pages} page objects. Heartwarming and age-appropriate with a clear resolution.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      const t = await res.text();
      throw new Error(`API ${res.status}: ${t.slice(0, 300)}`);
    }

    const data = await res.json();
    const raw = data.content?.find(b => b.type === 'text')?.text || '';
    document.getElementById('debug').textContent = 'RAW RESPONSE:\n' + raw;
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('No JSON found. Got: ' + raw.slice(0, 200));
    currentBook = { ...JSON.parse(match[0]), hero, theme, age };
    renderBook(currentBook);

  } catch(e) {
    showError(e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ Generate My Book';
    document.getElementById('loading').style.display = 'none';
  }
}

function renderBook(book) {
  document.getElementById('cover').innerHTML = `
    <div style="font-size:4rem;margin-bottom:12px">📚</div>
    <div class="cover-title">${book.title}</div>
    <div class="cover-tagline">${book.tagline}</div>
    <div class="cover-meta">${book.age} · ${book.theme}</div>`;

  document.getElementById('pages').innerHTML = (book.pages||[]).map((p,i) => `
    <div class="page-card">
      <span class="page-num">Page ${i+1}</span>
      <div class="page-art">${p.emoji||'🌟'}</div>
      <p class="page-text">${p.text}</p>
      <p class="page-note">🎨 ${p.illustrationNote}</p>
    </div>`).join('');

  document.getElementById('book').style.display = 'block';
  document.getElementById('book').scrollIntoView({ behavior: 'smooth' });
}

function copyStory() {
  if (!currentBook) return;
  const lines = [`📚 ${currentBook.title}`, `"${currentBook.tagline}"`, '',
    ...(currentBook.pages||[]).map((p,i) => `Page ${i+1}:\n${p.text}\n[Art: ${p.illustrationNote}]`)
  ];
  navigator.clipboard.writeText(lines.join('\n\n')).then(() => alert('Copied!'));
}
</script>
</body>
</html>
